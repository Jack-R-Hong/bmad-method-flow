name: coding-feature-dev
version: 1
description: "Full feature development: architect designs → dev implements → QA reviews → git commits"
requires:
  - plugin: provider-claude-code
  - plugin: bmad-method
  - plugin: plugin-git-ops
  - plugin: plugin-git-worktree
  - plugin: plugin-memory
    optional: true
steps:
  # Step 0 (optional): Query knowledge graph for context
  - id: memory_context
    type: function
    depends_on: []
    executor: plugin-memory
    optional: true
    config:
      command: ["plugin-memory", "query", "{{input}}"]
      timeout_seconds: 60

  # Step 1: Architect designs the solution
  - id: architect_design
    type: agent
    depends_on: [memory_context]
    executor: bmad-method
    config:
      model_tier: balanced
      system_prompt: |
        You are bmad/architect. Review the feature request and create a technical design
        including component breakdown, API contracts, and data flow.
        Also generate a short kebab-case branch name (e.g. "add-login-validation")
        and include it in your output as: branch_name: <name>
      user_prompt_template: "Design the architecture for: {{input}}"
      max_tokens: 4096
      context_from: [memory_context]
      timeout_seconds: 300

  # Step 2: Create isolated worktree for development
  - id: create_worktree
    type: function
    depends_on: [architect_design]
    executor: plugin-git-worktree
    config:
      command: ["git", "worktree", "add", "-b", "feature/{{branch_name}}", "../worktree-{{branch_name}}"]

  # Step 3: Developer implements the feature
  - id: dev_implement
    type: agent
    depends_on: [create_worktree]
    executor: provider-claude-code
    config:
      model_tier: balanced
      system_prompt: |
        You are a senior developer. Implement the feature based on the architect's design.
        Follow TDD: write tests first, then implementation code.
      user_prompt_template: "Implement feature based on architecture design: {{input}}"
      max_tokens: 8192
      context_from: [architect_design]
      timeout_seconds: 600

  # Step 4: QA code review
  - id: qa_review
    type: agent
    depends_on: [dev_implement]
    executor: bmad-method
    config:
      model_tier: balanced
      system_prompt: |
        You are bmad/qa. Review the implementation for quality, edge cases, security,
        and test coverage. Report findings with severity levels.
        End your review with a verdict line in exactly this format:
        verdict: approve OR verdict: request-changes OR verdict: reject
      user_prompt_template: "Review this implementation for quality and completeness"
      max_tokens: 4096
      context_from: [dev_implement]
      timeout_seconds: 300

  # Step 5: Detect changes & risk assessment via knowledge graph
  - id: memory_detect_changes
    type: function
    depends_on: [qa_review]
    executor: plugin-memory
    optional: true
    config:
      command: ["plugin-memory", "detect-changes"]
      timeout_seconds: 60

  # Step 6: Git commit
  - id: git_commit
    type: function
    depends_on: [memory_detect_changes]
    executor: git-ops
    config:
      command: ["bash", "-c", "git add -A && git commit -m \"feat: {{input}}\""]

  # Step 7: Re-index after commit
  - id: memory_reindex
    type: function
    depends_on: [git_commit]
    executor: plugin-memory
    optional: true
    config:
      command: ["plugin-memory", "reindex", "."]
      timeout_seconds: 120
