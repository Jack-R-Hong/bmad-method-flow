name: bootstrap-cycle
version: 1
description: "Full self-bootstrap cycle: plan → implement → test → review → rebuild → validate"
requires:
  - plugin: provider-claude-code
  - plugin: bmad-method
  - plugin: plugin-git-ops
steps:
  # Phase 1: Architect plans the change
  - id: plan
    type: agent
    depends_on: []
    executor: bmad-method
    config:
      model_tier: balanced
      system_prompt: |
        You are bmad/architect planning a change to the Pulse plugin ecosystem.
        The plugins live in sibling directories under pulse-plugins/:
        - provider-claude-code: AI agent execution (spawns Claude Code CLI)
        - git-ops: Git operations (commit, push, branch, PR)
        - git-worktree: Git worktree isolation for parallel dev
        - bmad-method: BMAD AI team (12 agents as step executor)
        - bmad-method-flow: BMAD content + Pulse config (this repo)

        Plan the change with awareness that these plugins are used to develop themselves.
        Consider: backward compatibility, build order, circular dependency risks.
      user_prompt_template: "Plan self-dev change: {{input}}"
      max_tokens: 4096
      timeout_seconds: 300

  # Phase 2: Implement
  - id: implement
    type: agent
    depends_on: [plan]
    executor: provider-claude-code
    config:
      model_tier: balanced
      system_prompt: |
        You are a senior Rust developer working on the Pulse plugin ecosystem.
        These plugins bootstrap themselves — they are used to develop themselves.
        Be extra careful with breaking changes. Follow the architect's plan strictly.
        Always run cargo test before considering implementation complete.
      user_prompt_template: "Implement: {{input}}"
      max_tokens: 8192
      context_from: [plan]
      timeout_seconds: 600

  # Phase 3: Test the changed plugin
  - id: test
    type: function
    depends_on: [implement]
    config:
      command: ["cargo", "test"]
      timeout_seconds: 300

  # Phase 4: QA review
  - id: review
    type: agent
    depends_on: [test]
    executor: bmad-method
    config:
      model_tier: balanced
      system_prompt: |
        You are bmad/qa. This is a self-bootstrapping system — the plugins being
        changed are the same ones running this workflow. Review with extra scrutiny:
        - Will this change break the currently running workflow?
        - Is there a safe upgrade path? (build new → swap → verify)
        - Are there any circular dependency issues?
        End your review with a verdict line in exactly this format:
        verdict: approve OR verdict: request-changes OR verdict: reject
      user_prompt_template: "Review self-dev change for safety"
      max_tokens: 4096
      context_from: [implement]
      timeout_seconds: 300

  # Phase 5: Rebuild all plugins with the change
  # Uses PULSE_PLUGINS_DIR env var (defaults to parent directory)
  - id: rebuild
    type: function
    depends_on: [review]
    config:
      command: ["bash", "-c", "BASE_DIR=\"${PULSE_PLUGINS_DIR:-$(cd .. && pwd)}\" && for d in provider-claude-code git-ops git-worktree bmad-method; do echo \"Building $d...\" && cd \"$BASE_DIR/$d\" && cargo build --release || exit 1; done"]
      timeout_seconds: 600

  # Phase 6: Hot-swap — install rebuilt plugins
  - id: install
    type: function
    depends_on: [rebuild]
    config:
      command: ["bash", "-c", "BASE_DIR=\"${PULSE_PLUGINS_DIR:-$(cd .. && pwd)}\" && DEST=\"$(pwd)/config/plugins\" && for f in \"$DEST\"/*; do rm -f \"$f\"; done && cp \"$BASE_DIR/provider-claude-code/target/release/provider-claude-code\" \"$DEST/\" && cp \"$BASE_DIR/git-ops/target/release/plugin-git-ops\" \"$DEST/\" && cp \"$BASE_DIR/git-worktree/target/release/plugin-git-worktree\" \"$DEST/\" && cp \"$BASE_DIR/bmad-method/target/release/bmad-method\" \"$DEST/\" && cp \"$(pwd)/target/release/plugin-coding-pack\" \"$DEST/\""]

  # Phase 7: Validate the new installation
  - id: validate
    type: function
    depends_on: [install]
    config:
      command: ["pulse", "registry", "validate", "--config", "./config"]

  # Phase 8: Commit
  - id: commit
    type: function
    depends_on: [validate]
    config:
      command: ["bash", "-c", "git add -A && git commit -m \"chore(bootstrap): {{input}}\""]
