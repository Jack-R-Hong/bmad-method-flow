name: coding-memory-index
version: 1
description: "Index codebase into GitNexus knowledge graph for impact analysis and context queries"
requires:
  - plugin: plugin-memory
steps:
  # Step 1: Run full codebase indexing
  - id: index_codebase
    type: function
    depends_on: []
    executor: plugin-memory
    config:
      command: ["plugin-memory", "index", "."]
      timeout_seconds: 300

  # Step 2: Verify index health
  - id: verify_index
    type: function
    depends_on: [index_codebase]
    executor: plugin-memory
    config:
      command: ["plugin-memory", "health"]
      timeout_seconds: 30
