name: coding-review
version: 1
description: "Multi-layer code review: adversarial + edge-case analysis in parallel, then synthesis"
requires:
  - plugin: bmad-method
  - plugin: plugin-memory
    optional: true
steps:
  # Step 0 (optional): Knowledge graph context for review
  - id: memory_context
    type: function
    depends_on: []
    executor: plugin-memory
    optional: true
    config:
      command: ["plugin-memory", "query", "{{input}}"]
      timeout_seconds: 60

  # Multi-agent code review session (replaces parallel review layers)
  - id: code_review_session
    type: session
    depends_on: [memory_context]
    config:
      participants:
        - agent: bmad/architect
          activation: every_turn
        - agent: bmad/qa
          activation: every_turn
      convergence:
        strategy: unanimous
        max_turns: 4
      system_prompt: "Perform a thorough code review. Evaluate architecture, edge cases, and quality. Reach consensus on approval or changes needed."
      context_from: [memory_context]

  # Synthesize session findings into final verdict
  - id: review_synthesis
    type: agent
    depends_on: [code_review_session]
    executor: provider-claude-code
    config:
      model_tier: balanced
      system_prompt: |
        Synthesize the code review discussion into a final verdict.
        Categorize findings by severity (critical/high/medium/low) and provide actionable fix suggestions.
        End your review with a verdict line in exactly this format:
        verdict: approve OR verdict: request-changes OR verdict: reject
      user_prompt_template: "Synthesize review findings into a prioritized action list"
      max_tokens: 4096
      context_from: [code_review_session]
      timeout_seconds: 300
