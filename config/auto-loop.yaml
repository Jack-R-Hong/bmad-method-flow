# Auto-Dev Loop Configuration
# Maps task labels to workflow IDs for automatic routing.
# When auto-dev picks a task, its labels determine which workflow runs.
# Falls back to coding-quick-dev if no label matches.
routing:
  - label: "story"
    workflow: "coding-story-dev"
  - label: "bug"
    workflow: "coding-bug-fix"
  - label: "refactor"
    workflow: "coding-refactor"
  - label: "quick"
    workflow: "coding-quick-dev"
  - label: "feature"
    workflow: "coding-feature-dev"
  - label: "review"
    workflow: "coding-review"
  - label: "pr-fix"
    workflow: "coding-pr-fix"
  - default: "coding-quick-dev"
max_retries: 3
validation_enabled: true
poll_interval_secs: 300
