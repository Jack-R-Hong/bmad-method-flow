name: bootstrap-rebuild
version: 1
description: "After self-dev changes, rebuild all plugins and reinstall into config/plugins"
requires:
  - plugin: provider-claude-code
steps:
  # Step 1: Build all plugins
  # Uses PULSE_PLUGINS_DIR env var (defaults to parent directory)
  - id: build_all
    type: function
    depends_on: []
    config:
      command: ["bash", "-c", "BASE_DIR=\"${PULSE_PLUGINS_DIR:-$(cd .. && pwd)}\" && for d in provider-claude-code git-ops git-worktree bmad-method; do echo \"Building $d...\" && cd \"$BASE_DIR/$d\" && cargo build --release || exit 1; done"]
      timeout_seconds: 600

  # Step 2: Copy binaries to config/plugins
  - id: install_plugins
    type: function
    depends_on: [build_all]
    config:
      command: ["bash", "-c", "BASE_DIR=\"${PULSE_PLUGINS_DIR:-$(cd .. && pwd)}\" && DEST=\"$(pwd)/config/plugins\" && cp \"$BASE_DIR/provider-claude-code/target/release/provider-claude-code\" \"$DEST/\" && cp \"$BASE_DIR/git-ops/target/release/plugin-git-ops\" \"$DEST/\" && cp \"$BASE_DIR/git-worktree/target/release/plugin-git-worktree\" \"$DEST/\" && cp \"$BASE_DIR/bmad-method/target/release/bmad-method\" \"$DEST/\""]

  # Step 3: Validate
  - id: validate
    type: function
    depends_on: [install_plugins]
    config:
      command: ["pulse", "registry", "validate", "--config", "./config"]
