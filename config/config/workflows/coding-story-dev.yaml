name: coding-story-dev
version: 1
description: "BMAD story-driven dev: SM prepares story → architect designs → dev implements → QA reviews"
requires:
  - plugin: provider-claude-code
  - plugin: bmad-method
  - plugin: plugin-git-ops
  - plugin: plugin-git-worktree
steps:
  # Step 1: Scrum Master prepares the story
  - id: prepare_story
    type: agent
    depends_on: []
    executor: bmad-method
    config:
      model_tier: balanced
      system_prompt: |
        You are bmad/sm. Prepare a detailed story specification with:
        - Clear user story format (As a... I want... So that...)
        - Acceptance criteria (Given/When/Then)
        - Technical notes and constraints
        - Definition of Done checklist
      user_prompt_template: "Prepare story spec from: {{input}}"
      max_tokens: 4096

  # Step 2: Architect creates technical design
  - id: technical_design
    type: agent
    depends_on: [prepare_story]
    executor: bmad-method
    config:
      model_tier: balanced
      system_prompt: |
        You are bmad/architect. Create a technical design for the story:
        - Component diagram and data flow
        - API contracts (if applicable)
        - Database changes (if applicable)
        - Test strategy
      user_prompt_template: "Create technical design for this story"
      max_tokens: 4096
      context_from: [prepare_story]

  # Step 3: Create worktree
  - id: create_worktree
    type: function
    depends_on: [technical_design]
    executor: plugin-git-worktree
    config:
      command: ["git", "worktree", "add", "-b", "story/{{branch_name}}", "../worktree-{{branch_name}}"]

  # Step 4: Developer implements with TDD
  - id: implement
    type: agent
    depends_on: [create_worktree]
    executor: provider-claude-code
    config:
      model_tier: balanced
      system_prompt: |
        You are a senior developer implementing a user story with TDD.
        Write tests first based on acceptance criteria, then implement to make them pass.
      user_prompt_template: "Implement story with TDD: {{input}}"
      max_tokens: 8192
      context_from: [prepare_story, technical_design]

  # Step 5: QA review against acceptance criteria
  - id: qa_review
    type: agent
    depends_on: [implement]
    executor: bmad-method
    config:
      model_tier: balanced
      system_prompt: |
        You are bmad/qa. Review the implementation against acceptance criteria.
        Verify every AC is covered by tests. Report any gaps or issues.
      user_prompt_template: "Review implementation against acceptance criteria"
      max_tokens: 4096
      context_from: [prepare_story, implement]

  # Step 6: Commit
  - id: git_commit
    type: function
    depends_on: [qa_review]
    executor: git-ops
    config:
      command: ["git", "add", "-A"]
