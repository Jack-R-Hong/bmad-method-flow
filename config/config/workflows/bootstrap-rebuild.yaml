name: bootstrap-rebuild
version: 1
description: "After self-dev changes, rebuild all plugins and reinstall into config/plugins"
requires:
  - plugin: provider-claude-code
steps:
  # Step 1: Build all plugins
  - id: build_all
    type: function
    depends_on: []
    config:
      command: ["bash", "-c", "cd ../provider-claude-code && cargo build --release && cd ../git-ops && cargo build --release && cd ../git-worktree && cargo build --release && cd ../bmad-method && cargo build --release"]
      timeout_seconds: 600

  # Step 2: Copy binaries to config/plugins
  - id: install_plugins
    type: function
    depends_on: [build_all]
    config:
      command: ["bash", "-c", "cp ../provider-claude-code/target/release/provider-claude-code config/plugins/ && cp ../git-ops/target/release/libplugin_git_ops.so config/plugins/plugin-git-ops && cp ../git-worktree/target/release/plugin-git-worktree config/plugins/ && cp ../bmad-method/target/release/bmad-method config/plugins/"]

  # Step 3: Validate
  - id: validate
    type: function
    depends_on: [install_plugins]
    config:
      command: ["pulse", "registry", "validate", "--config", "./config"]
