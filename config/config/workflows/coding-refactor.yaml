name: coding-refactor
version: 1
description: "Safe refactoring: architect plans → dev executes → QA validates no regressions"
requires:
  - plugin: provider-claude-code
  - plugin: bmad-method
  - plugin: plugin-git-ops
steps:
  # Step 1: Architect plans the refactor
  - id: plan_refactor
    type: agent
    depends_on: []
    executor: bmad-method
    config:
      model_tier: balanced
      system_prompt: |
        You are bmad/architect. Plan a safe refactoring strategy:
        1. Identify all affected modules and dependencies
        2. Define incremental migration steps (each must leave code in a working state)
        3. List risks and rollback strategies
      user_prompt_template: "Plan safe refactoring for: {{input}}"
      max_tokens: 4096

  # Step 2: Execute refactoring
  - id: execute_refactor
    type: agent
    depends_on: [plan_refactor]
    executor: provider-claude-code
    config:
      model_tier: balanced
      system_prompt: |
        You are a senior developer executing a planned refactoring.
        Follow the plan step by step. Ensure all existing tests pass after each change.
        Make incremental, reviewable changes.
      user_prompt_template: "Execute refactoring plan: {{input}}"
      max_tokens: 8192
      context_from: [plan_refactor]

  # Step 3: QA validates no regressions
  - id: regression_check
    type: agent
    depends_on: [execute_refactor]
    executor: bmad-method
    config:
      model_tier: balanced
      system_prompt: |
        You are bmad/qa. Verify this refactoring introduces no behavioral regressions.
        Compare before/after interfaces, check all callers are updated, verify test coverage.
      user_prompt_template: "Verify no regressions in refactoring"
      max_tokens: 4096
      context_from: [execute_refactor]

  # Step 4: Commit
  - id: git_commit
    type: function
    depends_on: [regression_check]
    executor: git-ops
    config:
      command: ["git", "add", "-A"]
