name: test-working-dir
version: 1
description: "E2E test: working_dir propagation"
steps:
  - id: setup
    type: function
    depends_on: []
    config:
      command: ["echo", "setup done"]
      timeout_seconds: 10

  - id: run_in_dir
    type: function
    depends_on: [setup]
    config:
      working_dir: "/tmp"
      command: ["bash", "-c", "pwd"]
      timeout_seconds: 10
