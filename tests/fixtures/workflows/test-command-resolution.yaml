name: test-command-resolution
version: 1
description: "E2E test: function step resolves command[0] not executor for program"
requires:
  - plugin: bmad-method
steps:
  # This step has executor pointing to bmad-method (a real plugin binary)
  # but command uses "echo" — command[0] should win, not executor
  - id: echo_step
    type: function
    depends_on: []
    executor: bmad-method
    config:
      command: ["echo", "command-resolution-works"]
      timeout_seconds: 10
