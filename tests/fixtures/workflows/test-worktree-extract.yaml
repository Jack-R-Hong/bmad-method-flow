name: test-worktree-extract
version: 1
description: "E2E test: worktree path extraction from git worktree add command"
steps:
  - id: create_worktree
    type: function
    depends_on: []
    config:
      command: ["echo", "git", "worktree", "add", "-b", "feature/test", "/tmp/test-worktree"]
      timeout_seconds: 10

  - id: use_working_dir
    type: function
    depends_on: [create_worktree]
    config:
      command: ["bash", "-c", "pwd"]
      timeout_seconds: 10
