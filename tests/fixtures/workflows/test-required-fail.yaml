name: test-required-fail
version: 1
description: "E2E test: required step fails, downstream skipped"
steps:
  - id: step_ok
    type: function
    depends_on: []
    config:
      command: ["echo", "first step ok"]
      timeout_seconds: 10

  - id: step_fail
    type: function
    depends_on: [step_ok]
    config:
      command: ["bash", "-c", "echo 'failing step' >&2 && exit 1"]
      timeout_seconds: 10

  - id: step_never_runs
    type: function
    depends_on: [step_fail]
    config:
      command: ["echo", "should never run"]
      timeout_seconds: 10
