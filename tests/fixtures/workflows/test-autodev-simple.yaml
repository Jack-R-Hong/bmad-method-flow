name: test-autodev-simple
version: 1
description: "E2E test: simple function-only workflow for auto-dev testing"
steps:
  - id: implement
    type: function
    depends_on: []
    config:
      command: ["echo", "Implemented: {{input}}"]
      timeout_seconds: 10

  - id: verify
    type: function
    depends_on: [implement]
    config:
      command: ["echo", "Verified output"]
      timeout_seconds: 10
