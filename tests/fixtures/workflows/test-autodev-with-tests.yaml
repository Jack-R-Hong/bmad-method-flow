name: test-autodev-with-tests
version: 1
description: "E2E test: workflow with test runner step for auto-dev validation testing"
steps:
  - id: implement
    type: function
    depends_on: []
    config:
      command: ["echo", "Implemented: {{input}}"]
      timeout_seconds: 10

  - id: run_tests
    type: function
    depends_on: [implement]
    executor: mock-test-runner
    config:
      command: ["mock-test-runner"]
      timeout_seconds: 10
